name: Lint And Format

on:
  push:

permissions:
  contents: read

jobs:
  format:
    name: Format Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare env files
        run: cp .env.secrets.example .env.secrets

      - name: Check formatting
        run: |
          make format
          git diff --exit-code

  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare env files
        run: cp .env.secrets.example .env.secrets

      - name: Run linters
        run: make lint
