# 共通環境変数を定義
x-var-db-data: &APP_DB_data "db-data:/var/lib/postgresql/data"
x-var-db-arclog: &APP_DB_arclog "db-arclog:${POSTGRES_ARCLOG_PATH:-/var/lib/postgresql/arclog}"

services:
  #DB本体
  postgres-db:
    build:
      context: postgres/.
      args:
        POSTGRES_VERSION: ${POSTGRES_VERSION:-18}
    env_file:
      - .env
      - .env.secrets
    restart: unless-stopped
    shm_size: 1g
    ports:
      - "127.0.0.1:5432:5432"
    environment:
      - PGDATA=${POSTGRES_VOLUMES_TARGET:-/var/lib/postgresql/data}
      - DATABASE_HOST=localhost
      - DB_EXTENSION=pg_trgm
    command:
      - postgres
      - -c
      - "listen_addresses=${POSTGRES_LISTEN_ADDRESSES:-*}"
      - -c
      - "archive_mode=${POSTGRES_ARCHIVE_MODE:-on}"
      - -c
      - "wal_level=${POSTGRES_WAL_LEVEL:-replica}"
      - -c
      - "archive_command=${POSTGRES_ARCHIVE_COMMAND:-cp %p ${POSTGRES_ARCLOG_PATH:-/var/lib/postgresql/arclog}/%f}"
    volumes:
      - *APP_DB_data
      - *APP_DB_arclog
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "10"
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U "$$POSTGRES_USER" -d "$$POSTGRES_DB" -h 127.0.0.1
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - pleasanter-service-network
  # wbsサイト本体      
  pleasanter-web:
    image: implem/pleasanter:${PLEASANTER_VERSION}
    restart: unless-stopped
    env_file:
      - .env.secrets
    depends_on:
      postgres-db:
        condition: service_healthy
    ports:
      - '50001:8080'
    # ports:
    #   # https-portalと被らないようにドメインを分ける
    #   - "8081:80"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "10"
    # volumes:
    #   - ./pleasanter/parameters:/var/opt/parameters
    networks:
      - pleasanter-service-network
  
  # 定期バックアップ用
  cron-backup:
    build:
      context: cron-backup/.
      args:
        PG_VER: ${POSTGRES_VERSION:-18}
    restart: unless-stopped
    env_file:
      - .env
      - .env.secrets
    depends_on:
      postgres-db:
        condition: service_healthy
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "10"
    volumes:
      - *APP_DB_data
      - *APP_DB_arclog
      # 自動バックアップされた結果は「/var/db_backup」に格納される。
      # コンテナの外からアクセスする場合は、このパスを外から見える所に配置しておく
      - db-backup:/var/db_backup
      # S3で自動バックアップする場合
      # aws cliの設定を以下パスに行う。
      # 存在しない場合はバックアップは行われない
      #- ./cron-backup/config/aws-cli:/root/.aws/
    networks:
      - pleasanter-service-network

  # DB定義更新
  codedefiner:
      image: implem/pleasanter:codedefiner
      env_file:
        - .env.secrets
      depends_on:
        postgres-db:
          condition: service_healthy
      networks:
        - pleasanter-service-network
      # このサービスをデフォルトで起動させないようにprofilesを指定する
      # 
      # [参考]
      # docker-compose up で一部のサービスを除外する方法
      #https://gotohayato.com/content/505/      
      profiles:
        - extra
volumes:
  db-data:
    driver: local
    # Compose の外ですでに作成済みの volume を指定する場合は ture を設定する。
    # そうすると、 docker-compose up 時に Compose は volume を作成しようとしません。
    # かつ、指定した volume が存在しないとエラーを raise します。
    #external: true
  db-arclog:
    driver: local
    # dbのバックアップ領域
  db-backup:
    driver: local

networks:
  # 他のcomposerと連携できるように、
  # ネットワーク名を明示的に設定する
  pleasanter-service-network:
