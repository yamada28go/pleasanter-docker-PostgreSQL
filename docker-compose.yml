  # cron-backup:
  #   build:
  #     context: cron-backup/.
  #   logging:
  #     driver: "json-file"
  #     options:
  #       max-size: "10m"
  #       max-file: "10"
  #   volumes:
  #     - *APP_DB_data
  #     - *APP_DB_arclog
  #     # 自動バックアップされた結果は「/var/db_backup」に格納される。
  #     # コンテナの外からアクセスする場合は、このパスを外から見える所に配置しておく
