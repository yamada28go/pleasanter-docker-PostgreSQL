# 共通環境変数を定義
x-var-db-data: &APP_DB_data "db-data:/var/lib/postgresql/data"
x-var-db-arclog: &APP_DB_arclog "db-arclog:/var/lib/postgresql/arclog"

services:
  #DB本体
  postgres-db:
    build:
      context: postgres/.
      args:
        POSTGRES_VERSION: ${POSTGRES_VERSION:-18}
    container_name: db-container
    shm_size: 1g
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - PGDATA=${POSTGRES_VOLUMES_TARGET:-/var/lib/postgresql/data}
      - DATABASE_HOST=localhost
      - DB_EXTENSION=pg_trgm
    command:
      - postgres
      - -c
      - config_file=/etc/postgresql.conf
      - -c
      - "listen_addresses=${POSTGRES_LISTEN_ADDRESSES:-*}"
      - -c
      - "archive_mode=${POSTGRES_ARCHIVE_MODE:-on}"
      - -c
      - "wal_level=${POSTGRES_WAL_LEVEL:-replica}"
      - -c
      - "archive_command=${POSTGRES_ARCHIVE_COMMAND:-cp %p /var/lib/postgresql/arclog/%f}"
    volumes:
      - ./postgres/init:/docker-entrypoint-initdb.d
      - ./postgres/conf/postgresql.conf:/etc/postgresql.conf
      - *APP_DB_data
      - *APP_DB_arclog
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "10"
    networks:
      - pleasanter-service-network
  # wbsサイト本体      
  pleasanter-web:
    container_name: pleasanter-web
    image: implem/pleasanter:${PLEASANTER_VERSION}
    depends_on:
      - postgres-db
    ports:
      - '50001:8080'
    environment:
      Implem.Pleasanter_Rds_PostgreSQL_SaConnectionString: ${Implem_Pleasanter_Rds_PostgreSQL_SaConnectionString}
      Implem.Pleasanter_Rds_PostgreSQL_OwnerConnectionString: ${Implem_Pleasanter_Rds_PostgreSQL_OwnerConnectionString}
      Implem.Pleasanter_Rds_PostgreSQL_UserConnectionString: ${Implem_Pleasanter_Rds_PostgreSQL_UserConnectionString}
    # ports:
    #   # https-portalと被らないようにドメインを分ける
    #   - "8081:80"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "10"
    # volumes:
    #   - ./pleasanter/parameters:/var/opt/parameters
    networks:
      - pleasanter-service-network
  
  # 定期バックアップ用
  cron-backup:
    build:
      context: cron-backup/.
      args:
        PG_VER: ${POSTGRES_VERSION:-18}
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "10"
    environment:
      - PGPASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_VERSION=${POSTGRES_VERSION:-18}
      - POSTGRES_VOLUMES_TARGET=${POSTGRES_VOLUMES_TARGET:-/var/lib/postgresql/data}
      - ZIP_PASSWORD=${ZIP_PASSWORD:?ZIP_PASSWORD is required}
      - BACKUP_DB_HOST=${BACKUP_DB_HOST:-postgres-db}
      - BACKUP_DB_PORT=${BACKUP_DB_PORT:-5432}
      - BACKUP_DB_NAME=${BACKUP_DB_NAME:-Implem.Pleasanter}
      - BACKUP_DB_USER=${BACKUP_DB_USER:-postgres}
      # dbのバックアップデータをs3に同期する
      # - ENABLE_S3_BACKUP=1
    volumes:
      - *APP_DB_data
      - *APP_DB_arclog
      # 自動バックアップされた結果は「/var/db_backup」に格納される。
      # コンテナの外からアクセスする場合は、このパスを外から見える所に配置しておく
      - db-backup:/var/db_backup
      # S3で自動バックアップする場合
      # aws cliの設定を以下パスに行う。
      # 存在しない場合はバックアップは行われない
      #- ./cron-backup/config/aws-cli:/root/.aws/
    networks:
      - pleasanter-service-network

  # DB定義更新
  codedefiner:
      container_name: codedefiner
      image: implem/pleasanter:codedefiner
      depends_on:
        - postgres-db
      environment:
        Implem.Pleasanter_Rds_PostgreSQL_SaConnectionString: ${Implem_Pleasanter_Rds_PostgreSQL_SaConnectionString}
        Implem.Pleasanter_Rds_PostgreSQL_OwnerConnectionString: ${Implem_Pleasanter_Rds_PostgreSQL_OwnerConnectionString}
        Implem.Pleasanter_Rds_PostgreSQL_UserConnectionString: ${Implem_Pleasanter_Rds_PostgreSQL_UserConnectionString}
      networks:
        - pleasanter-service-network
      # このサービスをデフォルトで起動させないようにprofilesを指定する
      # 
      # [参考]
      # docker-compose up で一部のサービスを除外する方法
      #https://gotohayato.com/content/505/      
      profiles:
        - extra

  # codedefiner:
  #   container_name: codedefiner
  #   image: implem/pleasanter:codedefiner
  #   depends_on:
  #     - postgres-db
  #   environment:
  #     Implem.Pleasanter_Rds_PostgreSQL_SaConnectionString: ${Implem_Pleasanter_Rds_PostgreSQL_SaConnectionString}
  #     Implem.Pleasanter_Rds_PostgreSQL_OwnerConnectionString: ${Implem_Pleasanter_Rds_PostgreSQL_OwnerConnectionString}
  #     Implem.Pleasanter_Rds_PostgreSQL_UserConnectionString: ${Implem_Pleasanter_Rds_PostgreSQL_UserConnectionString}

volumes:
  db-data:
    driver: local
    # Compose の外ですでに作成済みの volume を指定する場合は ture を設定する。
    # そうすると、 docker-compose up 時に Compose は volume を作成しようとしません。
    # かつ、指定した volume が存在しないとエラーを raise します。
    #external: true
  db-arclog:
    driver: local
    # dbのバックアップ領域
  db-backup:
    driver: local

networks:
  # 他のcomposerと連携できるように、
  # ネットワーク名を明示的に設定する
  pleasanter-service-network:
