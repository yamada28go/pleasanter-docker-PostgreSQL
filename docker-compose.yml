version: "3.7"

# 共通環境変数を定義
x-var-db-data: &APP_DB_data "db-data:/var/lib/postgresql/data"
x-var-db-arclog: &APP_DB_arclog "db-arclog:/var/lib/postgresql/arclog"

services:
  #DB本体
  postgres-db:
    build: postgres/.
    container_name: db-container
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - DATABASE_HOST=localhost
      - DB_EXTENSION=pg_trgm
    command: 'postgres -c config_file="/etc/postgresql.conf"'
    volumes:
      - ./postgres/init:/docker-entrypoint-initdb.d
      - ./postgres/conf/postgresql.conf:/etc/postgresql.conf
      - *APP_DB_data
      - *APP_DB_arclog
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "10"
    networks:
      - pleasanter-service-network
  # wbsサイト本体      
  pleasanter-web:
    container_name: pleasanter
    image: pleasanter-local-web:1.3.40.1
    depends_on:
      - postgres-db
    environment:
      Implem.Pleasanter_Rds_PostgreSQL_SaConnectionString: ${Implem_Pleasanter_Rds_PostgreSQL_SaConnectionString}
      Implem.Pleasanter_Rds_PostgreSQL_OwnerConnectionString: ${Implem_Pleasanter_Rds_PostgreSQL_OwnerConnectionString}
      Implem.Pleasanter_Rds_PostgreSQL_UserConnectionString: ${Implem_Pleasanter_Rds_PostgreSQL_UserConnectionString}
    ports:
      # https-portalと被らないようにドメインを分ける
      - "8081:80"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "10"
    # volumes:
    #   - ./pleasanter/parameters:/var/opt/parameters
    networks:
      - pleasanter-service-network
  
  # 定期バックアップ用
  cron-backup:
    build:
      context: cron-backup/.
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "10"
    environment:
      - PGPASSWORD=${POSTGRES_PASSWORD}
      # dbのバックアップデータをs3に同期する
      # - ENABLE_S3_BACKUP=1
    volumes:
      - *APP_DB_data
      - *APP_DB_arclog
      # 自動バックアップされた結果は「/var/db_backup」に格納される。
      # コンテナの外からアクセスする場合は、このパスを外から見える所に配置しておく
      - db-backup:/var/db_backup
      # S3で自動バックアップする場合
      # aws cliの設定を以下パスに行う。
      # 存在しない場合はバックアップは行われない
      #- ./cron-backup/config/aws-cli:/root/.aws/
    networks:
      - pleasanter-service-network

  # DB定義更新
  codedefiner:
      container_name: codedefiner
      image: pleasanter-local-codedefiner:1.3.40.1
      depends_on:
        - postgres-db
      environment:
        Implem.Pleasanter_Rds_PostgreSQL_SaConnectionString: ${Implem_Pleasanter_Rds_PostgreSQL_SaConnectionString}
        Implem.Pleasanter_Rds_PostgreSQL_OwnerConnectionString: ${Implem_Pleasanter_Rds_PostgreSQL_OwnerConnectionString}
        Implem.Pleasanter_Rds_PostgreSQL_UserConnectionString: ${Implem_Pleasanter_Rds_PostgreSQL_UserConnectionString}
      networks:
        - pleasanter-service-network
      # このサービスをデフォルトで起動させないようにprofilesを指定する
      # 
      # [参考]
      # docker-compose up で一部のサービスを除外する方法
      #https://gotohayato.com/content/505/      
      profiles:
        - extra
volumes:
  db-data:
    driver: local
    # Compose の外ですでに作成済みの volume を指定する場合は ture を設定する。
    # そうすると、 docker-compose up 時に Compose は volume を作成しようとしません。
    # かつ、指定した volume が存在しないとエラーを raise します。
    #external: true
  db-arclog:
    driver: local
    # dbのバックアップ領域
  db-backup:
    driver: local

networks:
  # 他のcomposerと連携できるように、
  # ネットワーク名を明示的に設定する
  pleasanter-service-network:
